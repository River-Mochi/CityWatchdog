<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     viewBox="0 0 100 100"
     width="100%"
     height="100%"
     role="img"
     aria-label="Notification icon">

  <!-- Main bubble outline -->
  <g fill="none"
     stroke="#111111"
     stroke-width="5.8"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M36 22 H63"/>
    <path d="M82 42 V61 Q82 72 71 72 H63 L56 80 Q52 84 48 80 L41 72 H33 Q22 72 22 61 V36 Q22 22 36 22"/>
  </g>

  <!-- Notification badge -->
  <circle cx="76" cy="24"
          r="9.5"
          fill="#f97316"
          stroke="#111111"
          stroke-width="5.8"/>

  <!-- Three message dots -->
  <circle cx="40" cy="54" r="3.6" fill="#22c55e"/>
  <circle cx="52" cy="54" r="3.6" fill="#facc15"/>
  <circle cx="64" cy="54" r="3.6" fill="#38bdf8"/>

</svg>
